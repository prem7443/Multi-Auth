version: "3.9"

services:
  multi-auth:
    image: ghcr.io/prem7443/multi-auth-api:latest
    container_name: multi-auth-api
    restart: unless-stopped

    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASS}@multi-auth-db:5432/${DB_NAME}
      PORT: 5000

    ports:
      - "5000:5000"

    depends_on:
      multi-auth-db:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - appnet

  multi-auth-db:
    image: postgres:16-alpine
    container_name: multi-auth-db
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}

    volumes:
      - multi_auth_db_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - appnet

networks:
  appnet:

volumes:
  multi_auth_db_data:
